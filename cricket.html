<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        body {
            text-align: center;
        }
    </style>
    <link rel="stylesheet" href="cricket.css">

</head>

<body>
    <h1>Bat Ball Stump Game </h1>

    <button onclick=" 
     computerChoice = playGame();
     resultMsg = getResult('bat', computerChoice);
    showResult('bat', computerChoice, resultMsg);
     ">Bat</button>


    <button onclick=" 
     computerChoice = playGame();

     resultMsg = getResult('ball', computerChoice);
   
 showResult('ball', computerChoice, resultMsg);
">Ball</button>


    <button onclick=" 
    computerChoice = playGame();

    resultMsg = getResult('stump', computerChoice);
    
     showResult('stump', computerChoice, resultMsg);
     ">Stump</button>


    <script>

        function playGame() {
            let computerChoice;
            let randomNumber = Math.random() * 3;

            if (randomNumber > 0 && randomNumber <= 1) {
                computerChoice = 'Bat';
            }

            else if (randomNumber > 1 && randomNumber <= 2) {
                computerChoice = 'Ball';
            }

            else {
                computerChoice = 'Stump';
            }
            return computerChoice;
        }

        function getResult(usermove, computerMove) {

            if (usermove === 'bat') {

                if (computerMove === 'Ball') { return ('user won'); }

                else if (computerMove === 'Stump') { return ('computer won'); }

                else if (computerMove === 'Bat') { return ('its a tie'); }
            }

            else if (usermove === 'ball') {

                if (computerMove === 'Ball') { return ('its a tie'); }

                else if (computerMove === 'Stump') { return ('user won'); }

                else if (computerMove === 'Bat') { return ('computer won'); }

            }

            else {

                if (computerMove === 'Ball') { return ('computer won'); }

                else if (computerMove === 'Stump') { return ('its a tie'); }

                else if (computerMove === 'Bat') { return ('user won'); }
            }
        }

        function showResult(userMove, computerChoice, result) {
            alert(`You have choosen ${userMove}.Computer choice is ${computerChoice} and ${result}`)
        }

    </script>

</body>

</html>
